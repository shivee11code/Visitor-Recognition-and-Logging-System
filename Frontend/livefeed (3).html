<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart IoT Doorbell — Live Feed</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🔔</text></svg>">
</head>
<body data-page="livefeed">
  <div class="glow-blob top-right"></div>

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-brand">
        <div class="dot"></div>
        <h2>Smart IoT <span>Doorbell</span></h2>
      </div>
    </div>
    <div class="header-right">
      <div class="avatar-btn" id="header-avatar" onclick="window.location.href='userprofile.html'" title="My Profile">👤</div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="page live-wrap">

    <div class="live-header">
      <div class="live-title">📷 Live Camera Feed</div>
      <div class="live-badge">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1.4s infinite;display:inline-block;flex-shrink:0;"></span>
        LIVE
      </div>
    </div>

    <div class="video-container">
      <!-- No-signal state -->
      <div class="no-signal" id="no-signal">
        <div class="cam-icon">📷</div>
        <p>INITIALIZING CAMERA...</p>
      </div>

      <video id="video" autoplay playsinline style="display:none;"></video>
      <div class="scanlines"></div>

      <div class="video-overlay">
        <span class="video-timestamp">FRONT DOOR · <span id="live-clock"></span></span>
        <span class="video-timestamp" style="color:var(--red);">● REC</span>
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="live-controls">
      <button class="btn btn-primary" onclick="captureVisitor()">📸 Capture Visitor</button>
      <button class="btn btn-secondary" onclick="backToDashboard()">← Back to Dashboard</button>
    </div>

  </main>

  <!-- ── CAPTURE MODAL ── -->
  <div class="modal-overlay" id="capture-modal">
    <div class="modal">
      <h3>Save Visitor</h3>
      <div class="capture-preview-wrap">
        <img id="capture-preview" src="" alt="Captured frame">
      </div>
      <div class="form-group">
        <label>Visitor Name</label>
        <input type="text" id="capture-name" placeholder="Enter name (or leave blank)">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="capture-status">
          <option value="unknown">Unknown</option>
          <option value="known">Known</option>
          <option value="delivery">Delivery</option>
        </select>
      </div>

      <!-- ── VOICE MESSAGE SECTION ── -->
      <div class="voice-record-section">
        <div class="voice-record-label">🎤 Voice Message <span class="voice-optional">(Optional)</span></div>
        <div class="voice-record-controls">
          <button type="button" class="btn btn-secondary btn-sm" id="voice-record-btn" onclick="toggleVoiceRecording()">
            🎤 Record Message
          </button>
          <span class="voice-status" id="voice-record-status"></span>
        </div>
        <div id="voice-playback" style="display:none;"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveCapturedVisitor()">Save to Log</button>
        <button class="btn btn-secondary" onclick="closeModal('capture-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
