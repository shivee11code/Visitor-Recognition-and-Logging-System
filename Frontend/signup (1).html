<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart IoT Doorbell — Create Account</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🔔</text></svg>">
</head>
<body data-page="signup">
  <div class="glow-blob top-right"></div>
  <div class="glow-blob bottom-left"></div>

  <div class="page auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-icon">🔔</div>
        <h1>Smart IoT <span>Doorbell</span></h1>
        <p>Create your account</p>
      </div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="Your full name" autocomplete="name">
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel">
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password"
               onkeydown="if(event.key==='Enter') signup()">
      </div>

      <button class="btn btn-primary btn-block" style="margin-top:8px;" onclick="signup()">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign In</a>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
