<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart IoT Doorbell — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🔔</text></svg>">
</head>
<body data-page="dashboard">
  <div class="glow-blob top-right"></div>

  <!-- ── SETTINGS SIDEBAR ── -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="settings-sidebar" id="settings-sidebar">
    <div class="sidebar-header">
      <h3>⚙️ Settings</h3>
      <p>CONFIGURE YOUR DOORBELL</p>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Account</div>

      <div class="sidebar-item" onclick="window.location.href='userprofile.html'">
        <div class="si-left">
          <span class="si-icon">👤</span>
          <div>
            <div class="si-label">Edit Profile</div>
            <div class="si-desc">Name, photo, phone</div>
          </div>
        </div>
        <span style="color:var(--muted); font-size:14px;">›</span>
      </div>

      <div class="sidebar-item" onclick="window.location.href='profile.html'">
        <div class="si-left">
          <span class="si-icon">🧑‍🤝‍🧑</span>
          <div>
            <div class="si-label">Profile Selection</div>
            <div class="si-desc">Switch profiles</div>
          </div>
        </div>
        <span style="color:var(--muted); font-size:14px;">›</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Preferences</div>

      <div class="sidebar-item" onclick="toggleDoNotDisturb()">
        <div class="si-left">
          <span class="si-icon">🔕</span>
          <div>
            <div class="si-label">Do Not Disturb</div>
            <div class="si-desc">Mute notifications</div>
          </div>
        </div>
        <div class="toggle" id="dnd-toggle"></div>
      </div>

      <div class="sidebar-item" onclick="toggleTheme()">
        <div class="si-left">
          <span class="si-icon">🌙</span>
          <div>
            <div class="si-label">Light Mode</div>
            <div class="si-desc">Switch appearance</div>
          </div>
        </div>
        <div class="toggle" id="theme-toggle"></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn btn-danger btn-block" onclick="logout()">← Logout</button>
    </div>
  </aside>

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-left">
      <div class="hamburger-btn" onclick="openSidebar()" title="Settings">☰</div>
      <div class="header-brand">
        <div class="dot"></div>
        <h2>Smart IoT <span>Doorbell</span></h2>
      </div>
    </div>

    <div class="header-right">
      <button class="btn-live" onclick="openLive()">
        <span class="live-dot"></span>
        <span>LIVE FEED</span>
      </button>

      <div class="notif-btn" id="notif-btn" onclick="toggleNotifPanel()" title="Notifications">
        🔔
        <span class="notif-badge" id="notif-badge" style="display:none;">0</span>
      </div>

      <div class="avatar-btn" id="header-avatar" onclick="window.location.href='userprofile.html'" title="My Profile">
        👤
      </div>
    </div>
  </header>

  <!-- ── NOTIFICATIONS PANEL ── -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <h4>🔔 Notifications</h4>
      <button class="mark-read-btn" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="notif-list" id="notif-list">
      <div class="notif-empty">NO NOTIFICATIONS</div>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <div class="dash-layout">
    <main class="page dash-main">

      <!-- Filters -->
      <div class="dash-filters">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input id="search" placeholder="Search by visitor name..." onkeyup="searchVisitor()">
        </div>
        <input type="date" id="dateFilter" class="date-input" onchange="filterDate()">
        <button class="clear-btn" id="clear-date" style="display:none;" onclick="clearDateFilter()">✕ Clear</button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="all">All Visitors</button>
        <button class="tab" data-tab="known">Known</button>
        <button class="tab" data-tab="unknown">Unknown</button>
      </div>

      <!-- Section Header -->
      <div class="section-header">
        <span class="section-title">Visitor Log</span>
        <span class="visitor-count" id="visitor-count">0 visitors</span>
      </div>

      <!-- List -->
      <div id="visitorList" class="visitor-list"></div>

    </main>
  </div>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
